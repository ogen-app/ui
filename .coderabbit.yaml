# CodeRabbit review configuration. Overrides the dashboard defaults and is
# itself reviewed in PRs. Docs: https://docs.coderabbit.ai/reference/yaml-template
language: en
reviews:
  profile: chill            # or "assertive" for nittier reviews
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    base_branches:
      - main
  path_filters:
    - "!dist/**"
    - "!pnpm-lock.yaml"
chat:
  auto_reply: true
